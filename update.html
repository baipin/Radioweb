<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update / 更新 - Baipon Radio</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* 1. 定义色彩变量 (Light Mode) */
        :root {
            --md-bg: #ffffff;
            --md-surface: #f8f9fa;
            --md-primary: #6200ee;
            --md-play-green: #01875f;
            --text-main: #202124;
            --text-sub: #5f6368;
            --border-color: #dadce0;
        }

        /* 2. 黑暗模式变量 (Media Query) */
        @media (prefers-color-scheme: dark) {
            :root {
                --md-bg: #121212;
                --md-surface: #1e1e1e;
                --md-primary: #bb86fc;
                --md-play-green: #00c853;
                --text-main: #e8eaed;
                --text-sub: #9aa0a6;
                --border-color: #3c4043;
            }
        }

        /* 3. 手动切换模式的强制覆盖类 */
        [data-theme="dark"] {
            --md-bg: #121212;
            --md-surface: #1e1e1e;
            --md-primary: #bb86fc;
            --md-play-green: #00c853;
            --text-main: #e8eaed;
            --text-sub: #9aa0a6;
            --border-color: #3c4043;
        }

        [data-theme="light"] {
            --md-bg: #ffffff;
            --md-surface: #f8f9fa;
            --md-primary: #6200ee;
            --md-play-green: #01875f;
            --text-main: #202124;
            --text-sub: #5f6368;
            --border-color: #dadce0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--md-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background-color 0.3s ease;
        }

        /* 主题切换按钮 */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            background: var(--md-surface);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 360px;
            padding: 24px;
            text-align: center;
        }

        .brand-section {
            margin-bottom: 40px;
        }

        .brand-icon {
            font-size: 80px;
            color: var(--md-primary);
            margin-bottom: 12px;
        }

        .btn {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 16px;
            text-decoration: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:active { transform: scale(0.96); }

        /* Google Play 按钮 - 置顶且高亮 */
        .btn-google {
            background-color: var(--md-play-green);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(1, 135, 95, 0.3);
        }

        /* APK 下载按钮 - 边框样式 */
        .btn-apk {
            background-color: transparent;
            color: var(--text-main);
            border: 2px solid var(--border-color);
        }

        .btn-label-en { font-size: 17px; font-weight: 600; }
        .btn-label-zh { font-size: 13px; opacity: 0.8; margin-top: 4px; }
        .btn i { margin-bottom: 6px; font-size: 28px; }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
    <i class="material-icons" id="theme-icon">brightness_auto</i>
</button>

<div class="container">
    <div class="brand-section">
        <i class="material-icons brand-icon">settings_input_antenna</i>
        <h2 style="margin:0; letter-spacing: 1px;">BAIPON RADIO</h2>
    </div>

    <a href="https://play.google.com/store/apps/details?id=com.baipon.radio" class="btn btn-google">
        <i class="material-icons">shop</i>
        <span class="btn-label-en">Update via Google Play</span>
        <span class="btn-label-zh">通过 Google Play 更新</span>
    </a>

    <a href="#" id="apk-link" class="btn btn-apk">
        <i class="material-icons">file_download</i>
        <span class="btn-label-en">Download APK Directly</span>
        <span class="btn-label-zh">直接下载 APK 文件</span>
    </a>

    <div class="footer">
        Baipon Radio · Edition 2026
    </div>
</div>

<script>
    // 1. 动态获取 APK 链接
    async function initApp() {
        try {
            const response = await fetch('./android.json');
            const data = await response.json();
            if (data.realdownUrl) {
                document.getElementById('apk-link').href = data.realdownUrl;
            }
        } catch (e) {
            console.error("JSON load failed", e);
        }
    }

    // 2. 主题切换逻辑
    function toggleTheme() {
        const body = document.documentElement;
        const currentTheme = body.getAttribute('data-theme');
        const icon = document.getElementById('theme-icon');
        
        if (currentTheme === 'dark') {
            body.setAttribute('data-theme', 'light');
            icon.innerText = 'light_mode';
        } else if (currentTheme === 'light') {
            body.setAttribute('data-theme', 'dark');
            icon.innerText = 'dark_mode';
        } else {
            // 如果是初始自动状态，点击则根据当前系统色调反转
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            icon.innerText = isDark ? 'light_mode' : 'dark_mode';
        }
    }

    window.onload = initApp;
</script>

</body>
</html>
