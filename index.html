    <style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.95);
        --glass-border: rgba(255, 255, 255, 0.6);
        --accent-color: #0081ff;
    }
    .mdui-theme-dark {
        --glass-bg: rgba(28, 28, 35, 0.95);

    }
    body { 
        margin: 0;

        background: transparent !important; 
        display: flex; 
        flex-direction: column; 
        color: #1f1f1f;
    }
      
    body::before {

    /* 导航栏 */
    .top-nav {
        position: fixed; top: 0; left: 0; right: 0; z-index: 1001;
        background: var(--glass-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); height: 64px;
    }
    .nav-content {
        max-width: 1200px; margin: 0 auto; padding: 0 24px;
        display: flex; align-items: center; height: 100%;
    }
    .nav-logo { height: 40px; margin-right: 12px; }


            /* 刷新动画 */
    .rotate-anim {
            animation: rotation 1s infinite linear;
        }
        @keyframes rotation {
            from { transform: rotate(0deg); }
            to { transform: rotate(359deg); }
}
        /* 透明毛玻璃页脚 */
    .main-footer {
        margin-top: auto;
        padding: 30px 20px;
        /* 背景半透明：0.4 表示 40% 不透明度 */
        background: rgba(255, 255, 255, 0.4); 
        /* 核心：毛玻璃模糊效果 */
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px); /* 兼容 Safari */
        
        /* 边框增加质感：上边框稍微亮一点，模拟高光 */
        border-top: 1px solid rgba(255, 255, 255, 0.3);
        text-align: center;
        transition: background 0.3s, backdrop-filter 0.3s;
    }
    
    /* 深色模式下的毛玻璃适配 */
    .mdui-theme-dark .main-footer {
        background: rgba(30, 30, 35, 0.4);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .footer-content {
        max-width: 1200px;
        margin: 0 auto;
    }
    
    .footer-links {
        margin-bottom: 10px;
    }
    
    .footer-links a {
        color: var(--accent-color);
        text-decoration: none;
        font-size: 14px;
        margin: 0 10px;
        font-weight: 500;
        /* 给文字增加一点点阴影，防止在复杂背景下看不清 */

    }
    
    .footer-copyright {

    }
    
    .mdui-theme-dark .footer-copyright {

    }
        /* 页脚结束 */
    /* 悬浮播放器 */
    .player-wrapper {
        position: sticky;
        top: 64px;
        z-index: 1000;
        padding: 16px 0;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .player-wrapper.is-sticky {
        background: var(--glass-bg);
        backdrop-filter: blur(25px);

        border-bottom: 1px solid var(--glass-border);
    }
    .radio-container { width: 95%; max-width: 1200px; margin: 80px auto 40px; flex: 1; }
    
    .player-card {
        max-width: 1200px; margin: 0 auto;
        display: flex; align-items: center; gap: 20px; padding: 20px 32px;
        background: rgba(255,255,255,0.98) !important;
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        flex-wrap: wrap;
    }
    .mdui-theme-dark .player-card {
        background: rgba(40,40,48,0.98) !important;
    }

    .player-wrapper.is-sticky .player-card {
        background: transparent;

    .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
    
    /* 加载动画相关 CSS */
    @keyframes fadeInScale {
        from { opacity: 0; transform: translateY(15px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .radio-item {

    .wave-box { display: none; align-items: flex-end; gap: 3px; height: 16px; margin-right: 10px; }

    .nav-content span, #current-name, #play-status { color: #1f1f1f !important; }

        /* 对话框主题随系统切换 */

    /* 深色模式下的下拉菜单文字颜色 */
    .mdui-theme-dark #language-dropdown {

    #language-dropdown div:hover {
        background: rgba(128, 128, 128, 0.1);
    }
    
    .mdui-theme-dark #language-dropdown div:hover {
        background: rgba(255, 255, 255, 0.1);
    }
</style>

    <script>
        const audio = document.getElementById('audio-player');
        const listDiv = document.getElementById('station-list');
        const masterBtn = document.getElementById('master-play-btn');
        const statusText = document.getElementById('play-status');
        const waveAnim = document.getElementById('playing-anim');
        const stickyWrapper = document.getElementById('player-sticky-wrapper');
       
        let customData = JSON.parse(localStorage.getItem('bp_radios_custom') || '[]');
        let favorites = JSON.parse(localStorage.getItem('bp_radios_favs') || '[]');
        let deletedUrls = JSON.parse(localStorage.getItem('bp_radios_deleted') || '[]');
        let sortOrder = JSON.parse(localStorage.getItem('bp_radios_sort_order') || '[]');
        
        let allStations = [];
        let currentFilter = '全部';
        let currentUrl = "";
        let hls = null;
        let editingUrl = null;

        // ==================== 黑暗模式管理 ====================
        // 初始化黑暗模式：优先读取用户设置，如无设置则跟随系统
        function initThemeMode() {
            const savedTheme = localStorage.getItem('bp_theme_mode');
            
            if (savedTheme === 'dark') {
                // 用户明确选择了深色模式
                applyDarkMode(true);
            } else if (savedTheme === 'light') {
                // 用户明确选择了浅色模式
                applyDarkMode(false);
            } else {
                // 自动跟随系统设置
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                applyDarkMode(prefersDark);
            }
        }

        // 应用黑暗模式
        function applyDarkMode(isDark) {
            const body = document.body;
            const themeToggleBtn = document.getElementById('theme-toggle');
            
            if (isDark) {
                body.classList.add('mdui-theme-dark');
                themeToggleBtn.icon = 'light_mode';
            } else {
                body.classList.remove('mdui-theme-dark');
                themeToggleBtn.icon = 'dark_mode';
            }
        }

        // 监听系统主题变化（当用户未设置偏好时）
        function setupSystemThemeListener() {
            const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            mediaQuery.addEventListener('change', (e) => {
                const savedTheme = localStorage.getItem('bp_theme_mode');
                // 只有在用户没有明确设置主题时，才跟随系统变化
                if (savedTheme === null) {
                    applyDarkMode(e.matches);
                }
            });
        }

        // 切换黑暗模式按钮
        document.getElementById('theme-toggle').onclick = () => {
            const isDark = document.body.classList.toggle('mdui-theme-dark');
            const themeToggleBtn = document.getElementById('theme-toggle');
            
            if (isDark) {
                themeToggleBtn.icon = 'light_mode';
                localStorage.setItem('bp_theme_mode', 'dark');
            } else {
                themeToggleBtn.icon = 'dark_mode';
                localStorage.setItem('bp_theme_mode', 'light');
            }
        };

        // 页面加载时初始化主题
        window.addEventListener('DOMContentLoaded', () => {
            initThemeMode();
            setupSystemThemeListener();
        });
        // ==================== 黑暗模式管理结束 ====================

        // 初始化延迟加载观察器
        const lazyObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const item = entry.target;
                    const stationData = JSON.parse(item.dataset.info);
                    item.innerHTML = `
                        <div style="width:52px;height:52px;">${getLogoHTML(stationData.logo, stationData.name)}</div>
                        <span style="font-weight:600; margin-top:12px; text-align:center; font-size:0.9rem;">${stationData.name}</span>
                        <div class="admin-actions">
                            <mdui-button-icon icon="edit" size="small" onclick="openEdit('${stationData.url}'); event.stopPropagation();"></mdui-button-icon>
                            <mdui-button-icon icon="keyboard_arrow_up" size="small" onclick="moveStation('${stationData.url}', -1); event.stopPropagation();"></mdui-button-icon>
                            <mdui-button-icon icon="keyboard_arrow_down" size="small" onclick="moveStation('${stationData.url}', 1); event.stopPropagation();"></mdui-button-icon>
                        </div>
                    `;
                    lazyObserver.unobserve(item);
                }
            });
        }, { rootMargin: '100px' });

        // 初始化拖拽排序
        const sortable = new Sortable(listDiv, {
            animation: 150,
            ghostClass: 'sortable-ghost',
            disabled: true, // 初始禁用，仅在管理模式开启
            onEnd: function() {
                const newOrder = Array.from(listDiv.querySelectorAll('.radio-item')).map(el => {
                    return JSON.parse(el.dataset.info).url;
                });
                sortOrder = newOrder;
                localStorage.setItem('bp_radios_sort_order', JSON.stringify(sortOrder));
            }
        });

        window.addEventListener('scroll', () => {
            if (window.scrollY > 40) {
                stickyWrapper.classList.add('is-sticky');
            } else {
                stickyWrapper.classList.remove('is-sticky');
            }
        });

        function getLogoHTML(logo, name) {
            if (logo && logo.trim() !== '') {
                return `<img src="${logo}" class="dynamic-logo" onerror="this.outerHTML = createPlaceholder('${name.replace(/'/g, "\\'")}').outerHTML">`;
            }
            return createPlaceholder(name).outerHTML;
        }

        function createPlaceholder(name) {
            const char = (name && name.length > 0) ? name.charAt(0).toUpperCase() : '?';
            const colors = ['#5e7eff', '#ff6b6b', '#4ecdc4', '#f9a825', '#ab47bc'];
            const colorIndex = Math.abs(name ? name.length : 0) % colors.length;
            const div = document.createElement('div');
            div.className = 'dynamic-logo';
            div.style.background = colors[colorIndex];
            div.innerText = char;
            return div;
        }

        function refresh() {
            const base = (typeof radioStations !== 'undefined' && Array.isArray(radioStations)) ? radioStations : [];
            const combinedRaw = [...base, ...customData];
            allStations = combinedRaw.filter(s => !deletedUrls.includes(s.url));
            
            if (sortOrder.length > 0) {
                allStations.sort((a, b) => {
                    let idxA = sortOrder.indexOf(a.url);
                    let idxB = sortOrder.indexOf(b.url);
                    if (idxA === -1) idxA = 9999;
                    if (idxB === -1) idxB = 9999;
                    return idxA - idxB;
                });
            }
           
            let cats = ['全部'];
            if(favorites.length > 0) cats.push('我的收藏');
            const allCategories = allStations.map(s => s.category || '未分类').filter((v, i, self) => self.indexOf(v) === i).sort();
            cats = [...cats, ...allCategories];

            const tabBox = document.getElementById('category-tabs');
            tabBox.innerHTML = '';
            cats.forEach(c => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${currentFilter === c ? 'active' : ''}`;
                btn.textContent = c;
                btn.onclick = () => { currentFilter = c; refresh(); };
                tabBox.appendChild(btn);
            });

            renderList();
            updateFavBtnState();
        }

        let currentRenderTask = null; // 用于取消上一次未完成的渲染

        function renderList() {
            lazyObserver.disconnect();
            listDiv.innerHTML = '';
            
            // 取消正在进行的渲染任务防止冲突
            if (currentRenderTask) {
                cancelAnimationFrame(currentRenderTask);
            }

            let filtered = allStations;
            if(currentFilter === '我的收藏') {
                filtered = allStations.filter(s => favorites.includes(s.url));
            } else if(currentFilter !== '全部') {
                filtered = allStations.filter(s => (s.category || '未分类') === currentFilter);
            }

            // --- 升级：分批渲染逻辑 ---
            const chunkSize = 20; // 每帧渲染的数量
            let index = 0;

            const renderChunk = () => {
                const limit = Math.min(index + chunkSize, filtered.length);
                const fragment = document.createDocumentFragment();

                for (; index < limit; index++) {
                    const s = filtered[index];
                    const item = document.createElement('div');
                    item.className = `radio-item ${currentUrl === s.url ? 'active' : ''}`;
                    // 设置动画延迟，形成交错入场效果
                    item.style.animationDelay = `${(index % chunkSize) * 0.05}s`;
                    item.dataset.info = JSON.stringify(s);
                    item.innerHTML = `<div style="width:52px;height:52px;" class="dynamic-logo">...</div>`;
                    item.onclick = () => play(s, item);
                    
                    fragment.appendChild(item);
                    lazyObserver.observe(item);
                }

                listDiv.appendChild(fragment);

                if (index < filtered.length) {
                    currentRenderTask = requestAnimationFrame(renderChunk);
                } else {
                    currentRenderTask = null;
                }
            };

            renderChunk();
            // --- 升级结束 ---
        }

        // 兼容原有的手动移动功能
        function moveStation(url, direction) {
            let currentOrder = allStations.map(s => s.url);
            let index = currentOrder.indexOf(url);
            if (index === -1) return;
            let newIndex = index + direction;
            if (newIndex < 0 || newIndex >= currentOrder.length) return;
            [currentOrder[index], currentOrder[newIndex]] = [currentOrder[newIndex], currentOrder[index]];
            sortOrder = currentOrder;
            localStorage.setItem('bp_radios_sort_order', JSON.stringify(sortOrder));
            refresh();
        }

        let isRetrying = false; 

function play(s, el) {
    let targetUrl = s.url;
    isRetrying = false; 

    if (targetUrl.startsWith('http://')) {
        targetUrl = `/api/proxy?url=${encodeURIComponent(targetUrl)}`;
        isRetrying = true; 
    }

    currentUrl = targetUrl;
    document.querySelectorAll('.radio-item').forEach(i => i.classList.remove('active'));
    if(el) el.classList.add('active');
    document.getElementById('current-name').innerText = s.name;
    document.getElementById('player-logo').innerHTML = getLogoHTML(s.logo, s.name);
    statusText.innerText = "缓冲中...";
    loadSource(targetUrl, s.url.includes('.m3u8'));
    updateFavBtnState();

    // 通知 App 频道名称 ---
    if (window.AndroidBridge) {
        // 需要在 WebView 中注入了名为 AndroidBridge 的对象
        window.AndroidBridge.onStationChanged(s.name, s.url, s.logo || "");
    }
    // ----------------------------
}

audio.onerror = async function() {
    if (!isRetrying) {
        isRetrying = true;
        statusText.innerText = "切换代理模式中...";
        const proxyUrl = `/api/proxy?url=${encodeURIComponent(currentUrl)}`;
        loadSource(proxyUrl, currentUrl.includes('.m3u8'));
    } else {
        statusText.innerText = "频道暂时不可用";
    }
};

function loadSource(url, isM3U8) {
    if (isM3U8) {
        if (Hls.isSupported()) {
            if (hls) hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(audio);
            hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play());
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal && !isRetrying) { audio.onerror(); }
            });
        } else {
            audio.src = url;
            audio.play();
        }
    } else {
        if (hls) hls.destroy();
        audio.src = url;
        audio.play();
    }
}

        function updateFavBtnState() {
            const btn = document.getElementById('fav-btn-main');
            if (!currentUrl) { btn.style.display = "none"; return; }
            btn.style.display = "inline-flex";
            const isFav = favorites.includes(currentUrl);
            btn.icon = isFav ? "favorite" : "favorite_border";
        }

        function forceReloadRadios() {
            const btnIcon = document.querySelector('#refresh');
            // 注意：mdui v2 使用的是图标名，这里确保选择器正确
            if(btnIcon) btnIcon.classList.add('rotate-anim'); 
        
            const script = document.createElement('script');
            script.src = `js/radio.js?t=${Date.now()}`;
        
            script.onload = function() {
                if(btnIcon) btnIcon.classList.remove('rotate-anim');
                
                // 关键：脚本加载后，先手动刷新一下全局变量（如果需要）
                // 然后执行 refresh() 重新构建 DOM
                refresh();
        
                mdui.snackbar({
                    message: '电台频道已同步',
                    position: 'right-top'
                });
    };
    document.head.appendChild(script);
}
         // 结束

        document.getElementById('fav-btn-main').onclick = () => {
            if (!currentUrl) return;
            if (favorites.includes(currentUrl)) {
                favorites = favorites.filter(u => u !== currentUrl);
            } else {
                favorites.push(currentUrl);
            }
            localStorage.setItem('bp_radios_favs', JSON.stringify(favorites));
            refresh();
        };

        const diag = document.getElementById('station-dialog');

        document.getElementById('open-add').onclick = () => {
            editingUrl = null;
            document.getElementById('diag-title').innerText = "添加电台";
            document.getElementById('f-name').value = "";
            document.getElementById('f-url').value = "";
            document.getElementById('f-url').disabled = false;
            document.getElementById('f-cat').value = "";
            document.getElementById('f-logo').value = "";
            document.getElementById('import-area-wrapper').style.display = "none";
            document.getElementById('btn-save').style.display = "inline-flex";
            document.getElementById('btn-do-import').style.display = "none";
            document.getElementById('btn-delete-station').style.display = "none";
            diag.open = true;
        };

        window.openEdit = (url) => {
            const s = allStations.find(x => x.url === url);
            if (!s) return;
            editingUrl = url;
            const base = (typeof radioStations !== 'undefined' && Array.isArray(radioStations)) ? radioStations : [];
            const isPreset = base.some(p => p.url === url);
            document.getElementById('diag-title').innerText = "编辑电台";
            document.getElementById('f-name').value = s.name;
            document.getElementById('f-cat').value = s.category || "";
            document.getElementById('f-logo').value = s.logo || "";
            const urlField = document.getElementById('f-url');
            if (isPreset) {
                urlField.value = "预置电台";
                urlField.disabled = true;
            } else {
                urlField.value = s.url;
                urlField.disabled = false;
            }
            document.getElementById('btn-save').style.display = "inline-flex";
            document.getElementById('btn-delete-station').style.display = "inline-flex";
            diag.open = true;
        };

        document.getElementById('btn-save').onclick = () => {
            const urlInput = document.getElementById('f-url');
            const s = {
                name: document.getElementById('f-name').value.trim(),
                url: urlInput.disabled ? editingUrl : urlInput.value.trim(),
                category: document.getElementById('f-cat').value.trim() || "默认",
                logo: document.getElementById('f-logo').value.trim()
            };
            if (!s.name || !s.url) return alert("必填项不能为空");
            if (editingUrl && editingUrl !== s.url) {
                if (!deletedUrls.includes(editingUrl)) deletedUrls.push(editingUrl);
                customData = customData.filter(x => x.url !== editingUrl);
            }
            customData = customData.filter(x => x.url !== s.url);
            customData.push(s);
            localStorage.setItem('bp_radios_custom', JSON.stringify(customData));
            deletedUrls = deletedUrls.filter(u => u !== s.url);
            localStorage.setItem('bp_radios_deleted', JSON.stringify(deletedUrls));
            diag.open = false;
            refresh();
        };

        document.getElementById('btn-delete-station').onclick = () => {
            if (confirm("确定删除吗？")) {
                customData = customData.filter(x => x.url !== editingUrl);
                localStorage.setItem('bp_radios_custom', JSON.stringify(customData));
                if (!deletedUrls.includes(editingUrl)) deletedUrls.push(editingUrl);
                localStorage.setItem('bp_radios_deleted', JSON.stringify(deletedUrls));
                diag.open = false;
                refresh();
            }
        };

        document.getElementById('show-import-area').onclick = () => {
            document.getElementById('import-area-wrapper').style.display = "block";
            document.getElementById('btn-save').style.display = "none";
            document.getElementById('btn-do-import').style.display = "inline-flex";
        };

        document.getElementById('btn-do-import').onclick = () => {
            try {
                const imported = JSON.parse(document.getElementById('import-area').value);
                customData = [...customData, ...imported];
                localStorage.setItem('bp_radios_custom', JSON.stringify(customData));
                diag.open = false;
                refresh();
            } catch (e) { alert("JSON 格式错误"); }
        };

        function closeDialog() { diag.open = false; }

        document.getElementById('toggle-admin').onclick = () => {
            const isAdmin = document.body.classList.toggle('is-admin-mode');
            document.getElementById('toggle-admin').icon = isAdmin ? 'check_circle' : 'settings';
            sortable.option("disabled", !isAdmin); // 只有管理模式允许拖拽
        };

       // --- 兼容性增强版播放控制 ---

        // 统一的播放/暂停逻辑
        const togglePlay = () => {
            if (!audio.src || audio.src === window.location.href) {
                statusText.innerText = "请先选择电台";
                return;
            }
        
            if (audio.paused) {
                // 播放逻辑
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.error("Safari 播放拦截:", error);
                        statusText.innerText = "点击图标以激活播放";
                    });
                }
            } else {
                // 暂停逻辑：针对 Safari 优化
                audio.pause();
                
                // 如果是直播流，暂停后重置 src 往往能解决恢复播放时的卡死问题
                // 但为了不删除无关代码，我们通过判断原生 HLS 还是 hls.js 来处理
                if (!hls && audio.canPlayType('application/vnd.apple.mpegurl')) {
                    // Safari 原生 HLS 环境下，暂停直播建议"停止加载"
                    // 这样下次播放会重新拉取最新切片，防止卡死在旧进度
                    const currentSrc = audio.src;
                    audio.src = ''; 
                    audio.load();
                    audio.src = currentSrc;
                }
            }
        };
        
        // 绑定按钮
        masterBtn.onclick = (e) => {
            e.preventDefault();
            togglePlay();
        };
        
                // 增加对音频对象的事件监听兼容性
        audio.onplaying = () => { 
            statusText.innerText = (window.translations && window.translations[window.currentLanguage]) 
                ? window.translations[window.currentLanguage].status_playing 
                : "正在直播"; 
            masterBtn.icon = "pause"; 
            waveAnim.style.display = "flex"; 
        };
        
        audio.onpause = () => { 
            masterBtn.icon = "play_arrow"; 
            waveAnim.style.display = "none"; 
            statusText.innerText = (window.translations && window.translations[window.currentLanguage]) 
                ? window.translations[window.currentLanguage].status_paused 
                : "已暂停"; 
        };
                
        // 修复 Safari 锁屏或控制中心操作导致的同步问题
        audio.onabort = () => {
            masterBtn.icon = "play_arrow";
            waveAnim.style.display = "none";
        };
        document.getElementById('volume-slider').oninput = (e) => audio.volume = e.target.value / 100;

        window.onload = () => {
            // 检查数据是否加载，如果没有，等待 500ms 再试
            const checkData = setInterval(() => {
                if (typeof radioStations !== 'undefined') {
                    refresh();
                    clearInterval(checkData);
                }
            }, 100);
            
            // 5秒后如果还没加载就停止，防止死循环
            setTimeout(() => clearInterval(checkData), 5000);
        };
