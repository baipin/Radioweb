<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百品电台 - 网络收音机</title>
    <link rel="stylesheet" href="https://unpkg.com/mdui@2.0.3/mdui.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/mdui@2.0.3/mdui.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="js/radio.js"></script>
    
</head>
<body class="mdui-theme-auto">
    <div class="top-nav">
        <div class="nav-content">
            <img src="img/logo.png" class="nav-logo" alt="百品电台" onerror="this.style.display='none';">
            <span style="font-weight: 900; font-size: 1.3rem;">百品电台</span>
            <div style="margin-left: auto; display: flex; align-items: center; gap: 8px;">
                <mdui-button-icon icon="settings" id="toggle-admin" title="管理模式"></mdui-button-icon>
                <mdui-button-icon icon="add" id="open-add" title="添加电台 / 批量导入"></mdui-button-icon>
                <mdui-button-icon id="theme-toggle" icon="dark_mode"></mdui-button-icon>
            </div>
        </div>
    </div>

    <div class="radio-container">
        <div class="player-wrapper" id="player-sticky-wrapper">
            <div class="player-card">
                <div class="logo-box" id="player-logo">
                    <div class="dynamic-logo">待</div>
                </div>
                <div style="flex: 1; min-width: 150px; display: flex; align-items: center; gap: 10px;">
                    <div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span id="current-name" style="font-size: 1.2rem; font-weight: 900;">准备就绪</span>
                            <mdui-button-icon id="fav-btn-main" icon="favorite_border" style="color: #ff5252;"></mdui-button-icon>
                        </div>
                        <div id="play-status" style="font-size: 0.85rem; opacity: 0.7;">请选择电台</div>
                    </div>
                </div>
                <div class="wave-box" id="playing-anim"><span></span><span></span><span></span></div>
                <div class="volume-box">
                    <mdui-button-icon id="mute-btn" icon="volume_up"></mdui-button-icon>
                    <mdui-slider id="volume-slider" value="80"></mdui-slider>
                </div>
                <mdui-button-icon id="master-play-btn" icon="play_arrow" variant="filled" style="--mdui-color-primary: var(--accent-color); width: 48px; height: 48px;"></mdui-button-icon>
            </div>
        </div>

        <audio id="audio-player"></audio>
        <div class="category-tabs" id="category-tabs"></div>
        <div class="radio-grid" id="station-list"></div>
    </div>

    <!-- 合并后的对话框：添加电台 + 批量导入 -->
    <mdui-dialog id="station-dialog">
        <span slot="headline" id="diag-title">添加电台</span>
        
        <div style="display: flex; flex-direction: column; gap: 16px; padding: 8px 0;">
            <!-- 单个添加 -->
            <div>
                <mdui-text-field label="名称" id="f-name"></mdui-text-field>
                <mdui-text-field label="链接" id="f-url"></mdui-text-field>
                <mdui-text-field label="分类" id="f-cat"></mdui-text-field>
                <mdui-text-field label="Logo 地址" id="f-logo"></mdui-text-field>
            </div>

            <!-- 批量导入区域 -->
            <div style="border-top: 1px solid rgba(128,128,128,0.2); padding-top: 16px;">
                <mdui-button variant="outlined" id="show-import-area" style="margin-bottom: 8px;">
                    批量导入 JSON
                </mdui-button>
                <div id="import-area-wrapper" style="display: none;">
                    <mdui-text-field 
                        label="粘贴 JSON 数组" 
                        rows="8" 
                        id="import-area"
                        placeholder='示例：
[
  {
    "name": "示例电台",
    "url": "https://example.com/stream.m3u8",
    "category": "香港",
    "logo": "https://example.com/logo.png"
  }
]'></mdui-text-field>
                    <div style="font-size: 0.8rem; opacity: 0.7; margin-top: 4px;">
                        直接粘贴电台数组，点击下方“导入”按钮
                    </div>
                </div>
            </div>
        </div>

        <mdui-button slot="action" variant="text" onclick="closeDialog()">取消</mdui-button>
        <mdui-button slot="action" variant="filled" id="btn-save">保存单个电台</mdui-button>
        <mdui-button slot="action" variant="filled" id="btn-do-import" style="display:none;">开始批量导入</mdui-button>
    </mdui-dialog>

    <script>
        const audio = document.getElementById('audio-player');
        const listDiv = document.getElementById('station-list');
        const masterBtn = document.getElementById('master-play-btn');
        const statusText = document.getElementById('play-status');
        const waveAnim = document.getElementById('playing-anim');
        const stickyWrapper = document.getElementById('player-sticky-wrapper');
       
        let customData = JSON.parse(localStorage.getItem('bp_radios_custom') || '[]');
        let favorites = JSON.parse(localStorage.getItem('bp_radios_favs') || '[]');
        let allStations = [];
        let currentFilter = '全部';
        let currentUrl = "";
        let hls = null;
        let editingUrl = null;

        // --- 悬浮逻辑 ---
        window.addEventListener('scroll', () => {
            if (window.scrollY > 40) {
                stickyWrapper.classList.add('is-sticky');
            } else {
                stickyWrapper.classList.remove('is-sticky');
            }
        });

        // --- Logo 渲染 ---
        function getLogoHTML(logo, name) {
            if (logo && logo.trim() !== '') {
                return `<img src="${logo}" class="dynamic-logo" onerror="this.outerHTML = createPlaceholder('${name.replace(/'/g, "\\'")}').outerHTML">`;
            }
            return createPlaceholder(name).outerHTML;
        }

        function createPlaceholder(name) {
            const char = (name && name.length > 0) ? name.charAt(0).toUpperCase() : '?';
            const colors = ['#5e7eff', '#ff6b6b', '#4ecdc4', '#f9a825', '#ab47bc'];
            const colorIndex = Math.abs(name ? name.length : 0) % colors.length;
            const div = document.createElement('div');
            div.className = 'dynamic-logo';
            div.style.background = colors[colorIndex];
            div.innerText = char;
            return div;
        }

        // --- 数据加载（修复：分类同时包含 radio.js 和自定义电台）---
        function refresh() {
            const base = (typeof radioStations !== 'undefined' && Array.isArray(radioStations)) ? radioStations : [];
            allStations = [...base, ...customData];
           
            let cats = ['全部'];
            if(favorites.length > 0) cats.push('我的收藏');
            
            // 同时遍历 radio.js 和 customData 中的所有分类
            const allCategories = [...base, ...customData]
                .map(s => s.category || '未分类')
                .filter((v, i, self) => self.indexOf(v) === i)  // 去重
                .sort();
            
            cats = [...cats, ...allCategories];

            const tabBox = document.getElementById('category-tabs');
            tabBox.innerHTML = '';
            cats.forEach(c => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${currentFilter === c ? 'active' : ''}`;
                btn.textContent = c;
                btn.onclick = () => { currentFilter = c; refresh(); };
                tabBox.appendChild(btn);
            });

            renderList();
            updateFavBtnState();
        }

        function renderList() {
            listDiv.innerHTML = '';
            let filtered = allStations;

            if(currentFilter === '我的收藏') {
                filtered = allStations.filter(s => favorites.includes(s.url));
            } else if(currentFilter !== '全部') {
                filtered = allStations.filter(s => (s.category || '未分类') === currentFilter);
            }

            filtered.forEach(s => {
                const item = document.createElement('div');
                item.className = `radio-item ${currentUrl === s.url ? 'active' : ''}`;
                item.innerHTML = `
                    <div style="width:52px;height:52px;">${getLogoHTML(s.logo, s.name)}</div>
                    <span style="font-weight:600; margin-top:12px; text-align:center; font-size:0.9rem;">${s.name}</span>
                    <div class="admin-actions">
                        <mdui-button-icon icon="edit" size="small" onclick="openEdit('${s.url}'); event.stopPropagation();"></mdui-button-icon>
                        <mdui-button-icon icon="delete" size="small" onclick="deleteStation('${s.url}'); event.stopPropagation();"></mdui-button-icon>
                    </div>
                `;
                item.onclick = () => play(s, item);
                listDiv.appendChild(item);
            });
        }

        // --- 播放与收藏逻辑 ---
        function play(s, el) {
            currentUrl = s.url;
            document.querySelectorAll('.radio-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
           
            document.getElementById('current-name').innerText = s.name;
            document.getElementById('player-logo').innerHTML = getLogoHTML(s.logo, s.name);
            statusText.innerText = "缓冲中...";
            updateFavBtnState();

            if (s.url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    if (hls) hls.destroy();
                    hls = new Hls();
                    hls.loadSource(s.url);
                    hls.attachMedia(audio);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play());
                } else {
                    audio.src = s.url;
                    audio.play();
                }
            } else {
                if (hls) hls.destroy();
                audio.src = s.url;
                audio.play();
            }
        }

        function updateFavBtnState() {
            const btn = document.getElementById('fav-btn-main');
            if (!currentUrl) { 
                btn.style.display = "none"; 
                return; 
            }
            btn.style.display = "inline-flex";
            const isFav = favorites.includes(currentUrl);
            btn.icon = isFav ? "favorite" : "favorite_border";
        }

        document.getElementById('fav-btn-main').onclick = () => {
            if (!currentUrl) return;
            if (favorites.includes(currentUrl)) {
                favorites = favorites.filter(u => u !== currentUrl);
            } else {
                favorites.push(currentUrl);
            }
            localStorage.setItem('bp_radios_favs', JSON.stringify(favorites));
            refresh();
        };

        // ====================== 对话框逻辑 ======================
        const diag = document.getElementById('station-dialog');

        document.getElementById('open-add').onclick = () => {
            editingUrl = null;
            document.getElementById('diag-title').innerText = "添加电台";
            document.getElementById('f-name').value = "";
            document.getElementById('f-url').value = "";
            document.getElementById('f-cat').value = "";
            document.getElementById('f-logo').value = "";
            
            document.getElementById('import-area').value = "";
            document.getElementById('import-area-wrapper').style.display = "none";
            document.getElementById('btn-save').style.display = "inline-flex";
            document.getElementById('btn-do-import').style.display = "none";

            diag.open = true;
        };

        window.openEdit = (url) => {
            const s = allStations.find(x => x.url === url);
            if (!s) return;
            editingUrl = url;

            document.getElementById('diag-title').innerText = "编辑电台";
            document.getElementById('f-name').value = s.name;
            document.getElementById('f-url').value = s.url;
            document.getElementById('f-cat').value = s.category || "";
            document.getElementById('f-logo').value = s.logo || "";

            document.getElementById('import-area-wrapper').style.display = "none";
            document.getElementById('btn-save').style.display = "inline-flex";
            document.getElementById('btn-do-import').style.display = "none";

            diag.open = true;
        };

        document.getElementById('btn-save').onclick = () => {
            const s = {
                name: document.getElementById('f-name').value.trim(),
                url: document.getElementById('f-url').value.trim(),
                category: document.getElementById('f-cat').value.trim() || "默认",
                logo: document.getElementById('f-logo').value.trim()
            };

            if (!s.name || !s.url) {
                alert("名称和链接不能为空");
                return;
            }

            customData = customData.filter(x => x.url !== s.url);
            customData.push(s);
            localStorage.setItem('bp_radios_custom', JSON.stringify(customData));
            diag.open = false;
            refresh();
        };

        document.getElementById('show-import-area').onclick = () => {
            document.getElementById('import-area-wrapper').style.display = "block";
            document.getElementById('btn-save').style.display = "none";
            document.getElementById('btn-do-import').style.display = "inline-flex";
        };

        document.getElementById('btn-do-import').onclick = () => {
            const jsonStr = document.getElementById('import-area').value.trim();
            if (!jsonStr) {
                alert("请输入JSON内容");
                return;
            }
            try {
                const imported = JSON.parse(jsonStr);
                if (!Array.isArray(imported)) throw new Error("必须是数组");

                customData = [...customData, ...imported];
                localStorage.setItem('bp_radios_custom', JSON.stringify(customData));
                
                alert(`成功导入 ${imported.length} 个电台`);
                diag.open = false;
                refresh();
            } catch (e) {
                alert("JSON格式错误，请检查格式。\n\n示例见上方文本框");
            }
        };

        function closeDialog() {
            diag.open = false;
        }

        // ====================== 其余原有逻辑 ======================
        document.getElementById('toggle-admin').onclick = () => {
            const isAdmin = document.body.classList.toggle('is-admin-mode');
            document.getElementById('toggle-admin').icon = isAdmin ? 'check_circle' : 'settings';
        };

        window.deleteStation = (url) => {
            customData = customData.filter(c => c.url !== url);
            localStorage.setItem('bp_radios_custom', JSON.stringify(customData));
            refresh();
        };

        audio.onplaying = () => { 
            statusText.innerText = "正在直播"; 
            masterBtn.icon = "pause"; 
            waveAnim.style.display = "flex"; 
        };
        audio.onpause = () => { 
            masterBtn.icon = "play_arrow"; 
            waveAnim.style.display = "none"; 
            statusText.innerText = "已暂停"; 
        };
        masterBtn.onclick = () => audio.src && (audio.paused ? audio.play() : audio.pause());

        document.getElementById('volume-slider').oninput = (e) => audio.volume = e.target.value / 100;

        document.getElementById('theme-toggle').onclick = () => {
            const isDark = document.body.classList.toggle('mdui-theme-dark');
            document.getElementById('theme-toggle').icon = isDark ? 'light_mode' : 'dark_mode';
        };

        window.onload = () => {
            setTimeout(refresh, 100);
        };
    </script>
</body>
</html>
