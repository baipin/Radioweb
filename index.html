<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百品电台 - 完整版</title>
    <link rel="stylesheet" href="https://unpkg.com/mdui@2.0.3/mdui.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/mdui@2.0.3/mdui.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="js/radio.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(255, 255, 255, 0.5);
            --accent-color: #0081ff;
        }
        .mdui-theme-dark {
            --glass-bg: rgba(30, 30, 35, 0.98);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        /* 修复：确保 body 有背景色，防止内容消失 */
        body { 
            margin: 0; min-height: 100vh; background-color: #f5f5f7; 
            display: flex; flex-direction: column; 
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('img/home.jpg') center/cover no-repeat; z-index: -2;
        }
        
        /* 导航栏 */
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1001;
            background: var(--glass-bg); backdrop-filter: blur(20px); 
            border-bottom: 1px solid var(--glass-border); height: 64px;
        }
        .nav-content { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; height: 100%; }

        /* 悬浮播放器容器 */
        .player-wrapper {
            position: sticky; top: 64px; z-index: 1000; padding: 16px 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .player-wrapper.is-sticky {
            background: var(--glass-bg); box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            backdrop-filter: blur(25px);
        }

        .radio-container { width: 95%; max-width: 1200px; margin: 80px auto 40px; flex: 1; }

        /* 播放器卡片 */
        .player-card { 
            max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 20px; padding: 20px 32px; 
            background: var(--glass-bg); border-radius: 24px; border: 1px solid var(--glass-border);
        }
        .player-wrapper.is-sticky .player-card { background: transparent; border: none; padding: 10px 32px; }

        .logo-box { width: 65px; height: 65px; flex-shrink: 0; transition: 0.3s; }
        .player-wrapper.is-sticky .logo-box { width: 45px; height: 45px; }

        .dynamic-logo { 
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; color: white; background: #888;
        }

        .category-tabs { display: flex; gap: 10px; flex-wrap: wrap; margin: 30px 0 20px; }
        .tab-btn { padding: 8px 18px; border-radius: 99px; border: none; background: rgba(128,128,128,0.1); cursor: pointer; color: inherit; transition: 0.3s; }
        .tab-btn.active { background: var(--accent-color); color: white; }

        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .radio-item { 
            display: flex; flex-direction: column; align-items: center; padding: 20px; 
            border-radius: 24px; cursor: pointer; background: var(--glass-bg); 
            border: 1px solid var(--glass-border); transition: 0.3s; position: relative;
        }
        .radio-item:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .radio-item.active { border-color: var(--accent-color); }

        .admin-actions { position: absolute; top: 10px; right: 10px; display: none; gap: 4px; }
        body.is-admin-mode .admin-actions { display: flex; }

        .wave-box { display: none; align-items: flex-end; gap: 3px; height: 16px; margin-right: 10px; }
        .wave-box span { width: 3px; background: var(--accent-color); animation: wave 1s infinite alternate; }
        @keyframes wave { from { height: 3px; } to { height: 16px; } }
    </style>
</head>
<body class="mdui-theme-auto">

    <div class="top-nav">
        <div class="nav-content">
            <span style="font-weight: 900; font-size: 1.3rem;">百品电台</span>
            <div style="margin-left: auto; display: flex; align-items: center; gap: 8px;">
                <mdui-button-icon icon="settings" id="toggle-admin" title="管理模式"></mdui-button-icon>
                <mdui-button-icon icon="file_upload" id="open-import" title="批量导入"></mdui-button-icon>
                <mdui-button-icon icon="add" id="open-add" title="添加新电台"></mdui-button-icon>
                <mdui-button-icon id="theme-toggle" icon="dark_mode"></mdui-button-icon>
            </div>
        </div>
    </div>

    <div class="radio-container">
        <div class="player-wrapper" id="player-sticky-wrapper">
            <div class="player-card">
                <div class="logo-box" id="player-logo"><div class="dynamic-logo">待</div></div>
                <div style="flex: 1;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span id="current-name" style="font-size: 1.2rem; font-weight: 900;">准备就绪</span>
                        <mdui-button-icon id="fav-btn-main" icon="favorite_border" style="color: #ff5252; display: none;"></mdui-button-icon>
                    </div>
                    <div id="play-status" style="opacity: 0.7; font-size: 0.85rem;">选择频道开始收听</div>
                </div>
                <div class="wave-box" id="playing-anim"><span></span><span></span><span></span></div>
                <div class="volume-box" style="display: flex; align-items: center; width: 150px; gap: 8px;">
                    <mdui-button-icon icon="volume_up"></mdui-button-icon>
                    <mdui-slider id="volume-slider" value="80"></mdui-slider>
                </div>
                <mdui-button-icon id="master-play-btn" icon="play_arrow" variant="filled" style="--mdui-color-primary: var(--accent-color); width: 48px; height: 48px;"></mdui-button-icon>
            </div>
        </div>

        <audio id="audio-player"></audio>
        <div class="category-tabs" id="category-tabs"></div>
        <div class="radio-grid" id="station-list"></div>
    </div>

    <mdui-dialog id="station-dialog">
        <span slot="headline" id="diag-title">电台设置</span>
        <div style="display: flex; flex-direction: column; gap: 12px; padding-top: 10px;">
            <mdui-text-field label="电台名称" id="f-name"></mdui-text-field>
            <mdui-text-field label="流媒体链接" id="f-url"></mdui-text-field>
            <mdui-text-field label="所属分类" id="f-cat"></mdui-text-field>
            <mdui-text-field label="Logo 图片地址 (选填)" id="f-logo"></mdui-text-field>
        </div>
        <mdui-button slot="action" variant="text" onclick="diag.open=false">取消</mdui-button>
        <mdui-button slot="action" variant="filled" id="btn-save">保存</mdui-button>
    </mdui-dialog>

    <mdui-dialog id="import-dialog">
        <span slot="headline">批量导入 JSON</span>
        <mdui-text-field label="粘贴 JSON 数组" rows="6" id="import-area"></mdui-text-field>
        <mdui-button slot="action" variant="text" onclick="document.getElementById('import-dialog').open=false">取消</mdui-button>
        <mdui-button slot="action" variant="filled" id="btn-do-import">开始导入</mdui-button>
    </mdui-dialog>

    <script>
        const audio = document.getElementById('audio-player');
        const listDiv = document.getElementById('station-list');
        const masterBtn = document.getElementById('master-play-btn');
        const stickyWrapper = document.getElementById('player-sticky-wrapper');
        
        let customData = JSON.parse(localStorage.getItem('bp_radios_custom') || '[]');
        let favorites = JSON.parse(localStorage.getItem('bp_radios_favs') || '[]');
        let currentFilter = '全部';
        let currentUrl = "";
        let hls = null;

        // --- 核心：数据获取逻辑修复 ---
        function getStations() {
            const base = (window.radioStations || []); // 从 radio.js 中读取
            return [...base, ...customData];
        }

        function refresh() {
            const all = getStations();
            if (all.length === 0) { // 延迟等待 radio.js 加载
                setTimeout(refresh, 500);
                return;
            }

            // 提取分类
            let cats = ['全部'];
            if(favorites.length > 0) cats.push('我的收藏');
            const otherCats = [...new Set(all.map(s => s.category || '未分类'))];
            cats = [...cats, ...otherCats];

            const tabBox = document.getElementById('category-tabs');
            tabBox.innerHTML = '';
            cats.forEach(c => {
                const b = document.createElement('button');
                b.className = `tab-btn ${currentFilter === c ? 'active' : ''}`;
                b.textContent = c;
                b.onclick = () => { currentFilter = c; refresh(); };
                tabBox.appendChild(b);
            });

            // 渲染列表
            listDiv.innerHTML = '';
            let filtered = all;
            if(currentFilter === '我的收藏') filtered = all.filter(s => favorites.includes(s.url));
            else if(currentFilter !== '全部') filtered = all.filter(s => (s.category || '未分类') === currentFilter);

            filtered.forEach(s => {
                const item = document.createElement('div');
                item.className = `radio-item ${currentUrl === s.url ? 'active' : ''}`;
                item.innerHTML = `
                    <div style="width:52px;height:52px;">${getLogoHTML(s.logo, s.name)}</div>
                    <span style="font-weight:600; margin-top:12px; font-size:0.9rem; text-align:center;">${s.name}</span>
                    <div class="admin-actions">
                        <mdui-button-icon icon="edit" size="small" onclick="openEdit('${s.url}'); event.stopPropagation();"></mdui-button-icon>
                        <mdui-button-icon icon="delete" size="small" onclick="deleteStation('${s.url}'); event.stopPropagation();"></mdui-button-icon>
                    </div>
                `;
                item.onclick = () => play(s, item);
                listDiv.appendChild(item);
            });
            updateFavBtn();
        }

        // --- 播放逻辑 ---
        function play(s, el) {
            currentUrl = s.url;
            document.getElementById('current-name').innerText = s.name;
            document.getElementById('player-logo').innerHTML = getLogoHTML(s.logo, s.name);
            document.getElementById('fav-btn-main').style.display = "inline-flex";
            document.getElementById('play-status').innerText = "缓冲中...";
            updateFavBtn();

            if (s.url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    if (hls) hls.destroy();
                    hls = new Hls(); hls.loadSource(s.url); hls.attachMedia(audio);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play());
                }
            } else {
                if (hls) hls.destroy();
                audio.src = s.url; audio.play();
            }
        }

        // --- 收藏逻辑 ---
        function updateFavBtn() {
            const btn = document.getElementById('fav-btn-main');
            btn.icon = favorites.includes(currentUrl) ? "favorite" : "favorite_border";
        }
        document.getElementById('fav-btn-main').onclick = () => {
            if(!currentUrl) return;
            favorites.includes(currentUrl) ? favorites = favorites.filter(u => u!==currentUrl) : favorites.push(currentUrl);
            localStorage.setItem('bp_radios_favs', JSON.stringify(favorites));
            refresh();
        };

        // --- 辅助功能 ---
        function getLogoHTML(logo, name) {
            if (logo) return `<img src="${logo}" class="dynamic-logo" onerror="this.replaceWith(createPlaceholder('${name}'))">`;
            return createPlaceholder(name).outerHTML;
        }
        function createPlaceholder(name) {
            const div = document.createElement('div');
            div.className = 'dynamic-logo';
            const colors = ['#5e7eff', '#ff6b6b', '#4ecdc4', '#f9a825', '#ab47bc'];
            div.style.background = colors[Math.abs(name.length) % colors.length];
            div.innerText = name ? name.charAt(0) : '?';
            return div;
        }

        // 悬浮逻辑
        window.onscroll = () => { window.scrollY > 40 ? stickyWrapper.classList.add('is-sticky') : stickyWrapper.classList.remove('is-sticky'); };

        // 管理功能
        const diag = document.getElementById('station-dialog');
        document.getElementById('open-add').onclick = () => {
            document.getElementById('f-name').value = ""; document.getElementById('f-url').value = ""; diag.open = true;
        };
        window.openEdit = (url) => {
            const s = getStations().find(x => x.url === url);
            document.getElementById('f-name').value = s.name;
            document.getElementById('f-url').value = s.url;
            document.getElementById('f-cat').value = s.category || "";
            document.getElementById('f-logo').value = s.logo || "";
            diag.open = true;
        };
        document.getElementById('btn-save').onclick = () => {
            const s = { name: document.getElementById('f-name').value, url: document.getElementById('f-url').value, category: document.getElementById('f-cat').value, logo: document.getElementById('f-logo').value };
            customData = customData.filter(x => x.url !== s.url); customData.push(s);
            localStorage.setItem('bp_radios_custom', JSON.stringify(customData));
            diag.open = false; refresh();
        };
        window.deleteStation = (url) => {
            customData = customData.filter(c => c.url !== url);
            localStorage.setItem('bp_radios_custom', JSON.stringify(customData));
            refresh();
        };

        // 基础组件
        document.getElementById('master-play-btn').onclick = () => audio.paused ? audio.play() : audio.pause();
        audio.onplaying = () => { masterBtn.icon="pause"; document.getElementById('playing-anim').style.display="flex"; document.getElementById('play-status').innerText="正在直播"; };
        audio.onpause = () => { masterBtn.icon="play_arrow"; document.getElementById('playing-anim').style.display="none"; document.getElementById('play-status').innerText="已暂停"; };
        document.getElementById('toggle-admin').onclick = () => document.body.classList.toggle('is-admin-mode');
        document.getElementById('volume-slider').oninput = (e) => audio.volume = e.target.value / 100;
        document.getElementById('theme-toggle').onclick = () => document.body.classList.toggle('mdui-theme-dark');
        document.getElementById('open-import').onclick = () => document.getElementById('import-dialog').open = true;
        document.getElementById('btn-do-import').onclick = () => {
            try { customData = [...customData, ...JSON.parse(document.getElementById('import-area').value)];
            localStorage.setItem('bp_radios_custom', JSON.stringify(customData));
            document.getElementById('import-dialog').open = false; refresh(); } catch(e){ alert("JSON格式错误"); }
        };

        window.onload = refresh;
    </script>
</body>
</html>
