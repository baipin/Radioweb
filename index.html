<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百品电台 - 网络收音机</title>
    <link rel="stylesheet" href="https://unpkg.com/mdui@2.0.3/mdui.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/mdui@2.0.3/mdui.global.js"></script>
    <script src="js/radio.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.88);
            --glass-border: rgba(255, 255, 255, 0.5);
            --accent-color: #0081ff;
        }
        .mdui-theme-dark {
            --glass-bg: rgba(28, 28, 35, 0.92);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0; min-height: 100vh; background: transparent !important;
            display: flex; flex-direction: column;
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('img/home.jpg') center/cover no-repeat; z-index: -2;
            filter: brightness(0.9);
        }
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border); height: 64px;
        }
        .nav-content {
            max-width: 1200px; margin: 0 auto; padding: 0 24px;
            display: flex; align-items: center; height: 100%;
        }
        .logo-title {
            display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.5rem;
            color: inherit; text-decoration: none;
        }
        .nav-links {
            margin-left: 60px; display: flex; gap: 32px; font-size: 1.05rem; font-weight: 500;
        }
        .nav-links a { color: inherit; text-decoration: none; }
        .nav-links a.active { color: var(--accent-color); font-weight: 600; }

        .radio-container {
            width: 95%; max-width: 1200px; margin: 90px auto 40px; padding: 32px;
            background: var(--glass-bg); backdrop-filter: blur(25px);
            border-radius: 28px; border: 1px solid var(--glass-border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.15); flex: 1;
        }
        .category-tabs {
            display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px;
        }
        .tab-btn {
            padding: 8px 20px; border-radius: 9999px; border: none;
            background: rgba(128,128,128,0.1); cursor: pointer; font-size: 0.95rem;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: var(--accent-color); color: white;
        }
        .player-card {
            display: flex; align-items: center; gap: 24px; padding: 24px;
            background: rgba(128,128,128,0.08); border-radius: 24px; margin-bottom: 32px;
        }
        #current-logo {
            width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
            background: white; box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .radio-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }
        .radio-item {
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; border-radius: 24px; cursor: pointer;
            background: rgba(128,128,128,0.05); transition: all 0.3s;
        }
        .radio-item:hover {
            transform: translateY(-6px); box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        }
        .radio-item.active {
            border: 2px solid var(--accent-color);
        }
        .placeholder-logo {
            width: 52px; height: 52px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; font-weight: bold; color: white;
            margin-bottom: 12px;
        }
        .wave-box { display: none; align-items: flex-end; gap: 4px; height: 18px; }
        .wave-box span { width: 4px; background: var(--accent-color); animation: wave 1.1s infinite alternate; }
        .wave-box span:nth-child(2) { animation-delay: 0.15s; }
        .wave-box span:nth-child(3) { animation-delay: 0.35s; }
        @keyframes wave { from { height: 4px; } to { height: 18px; } }
        footer {
            text-align: center; padding: 24px; color: #888; font-size: 0.9rem;
            background: rgba(0,0,0,0.12); margin-top: auto;
        }
        .add-btn { position: fixed; bottom: 30px; right: 30px; z-index: 999; }
    </style>
</head>
<body class="mdui-theme-auto">

    <!-- 导航栏 -->
    <div class="top-nav">
        <div class="nav-content">
            <a href="https://www.baipon.com" class="logo-title">
                <img src="img/logo.png" alt="百品" style="height: 38px;">
                <span>百品电台</span>
            </a>
            <div class="nav-links">
                <a href="https://www.baipon.com">首页</a>
                <a href="#" class="active">电台</a>
                <a href="#">电视</a>
                <a href="#">更多</a>
            </div>
            <div style="margin-left: auto; display: flex; align-items: center; gap: 16px;">
                <mdui-button-icon id="theme-toggle" icon="dark_mode"></mdui-button-icon>
                <a href="https://www.baipon.com">
                    <mdui-button-icon icon="home" title="返回百品首页"></mdui-button-icon>
                </a>
            </div>
        </div>
    </div>

    <div class="radio-container">
        <div class="player-card">
            <img id="current-logo" src="img/logo.png" alt="Logo">
            <div style="flex: 1;">
                <div id="current-name" style="font-size: 1.35rem; font-weight: 900;">请选择电台</div>
                <div id="play-status" style="font-size: 0.88rem; opacity: 0.65;">就绪</div>
            </div>
            <div class="wave-box" id="playing-anim"><span></span><span></span><span></span></div>
            <mdui-button-icon id="master-play-btn" icon="play_arrow" variant="filled" style="--mdui-color-primary: var(--accent-color)"></mdui-button-icon>
        </div>

        <audio id="audio-player"></audio>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <div class="category-tabs" id="category-tabs"></div>
            <mdui-button variant="outlined" onclick="showAddDialog()">+ 添加电台</mdui-button>
        </div>

        <div class="radio-grid" id="station-list"></div>
    </div>

    <footer>
        <p>© 2026 百品导航 · 百品电台 | 仅供学习交流 · 直播流地址来源于公开网络</p>
    </footer>

    <!-- 添加电台对话框 -->
    <mdui-dialog id="add-dialog" headline="添加自定义电台">
        <mdui-text-field id="add-name" label="电台名称 *" variant="outlined"></mdui-text-field>
        <mdui-text-field id="add-url" label="直播地址 (m3u8 / mp3) *" variant="outlined" style="margin-top: 16px;"></mdui-text-field>
        <mdui-text-field id="add-logo" label="Logo 地址 (可选)" variant="outlined" style="margin-top: 16px;"></mdui-text-field>
        <mdui-text-field id="add-category" label="分类 (如 台湾、网络音乐)" variant="outlined" style="margin-top: 16px;"></mdui-text-field>
        
        <mdui-button slot="action" variant="text" onclick="closeAddDialog()">取消</mdui-button>
        <mdui-button slot="action" onclick="addCustomStation()">添加</mdui-button>
    </mdui-dialog>

    <script>
        const audio = document.getElementById('audio-player');
        const listDiv = document.getElementById('station-list');
        const masterBtn = document.getElementById('master-play-btn');
        const currentLogoContainer = document.getElementById('current-logo').parentElement; // 用于替换 logo
        const currentName = document.getElementById('current-name');
        const statusText = document.getElementById('play-status');
        const waveAnim = document.getElementById('playing-anim');
        const themeToggle = document.getElementById('theme-toggle');

        let allStations = [...(typeof radioStations !== 'undefined' ? radioStations : [])];
        let currentFilter = '全部';

        // 加载自定义电台
        function loadCustomStations() {
            const saved = localStorage.getItem('customRadioStations');
            if (saved) {
                allStations = [...allStations, ...JSON.parse(saved)];
            }
        }

        function getRandomColor() {
            const colors = ['#5e7eff', '#ff6b6b', '#4ecdc4', '#45b7d1', '#96c93d', '#f9a825', '#ab47bc'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function getPlaceholder(name) {
            const firstChar = name ? name.charAt(0) : '?';
            const color = getRandomColor();
            return `<div class="placeholder-logo" style="background:${color};">${firstChar}</div>`;
        }

        function getLogoHTML(logo, name) {
            if (logo && logo.trim() !== '') {
                return `<img src="${logo}" onerror="this.outerHTML = getPlaceholder('${name}')" style="width:80px;height:80px;border-radius:50%;object-fit:cover;background:white;box-shadow:0 8px 20px rgba(0,0,0,0.15);">`;
            }
            return getPlaceholder(name);
        }

        function renderCategories() {
            const categories = ['全部', ...new Set(allStations.map(s => s.category || '未分类'))];
            const tabs = document.getElementById('category-tabs');
            tabs.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${cat === currentFilter ? 'active' : ''}`;
                btn.textContent = cat;
                btn.onclick = () => {
                    currentFilter = cat;
                    renderCategories();
                    renderStations();
                };
                tabs.appendChild(btn);
            });
        }

        function renderStations() {
            listDiv.innerHTML = '';
            const filtered = currentFilter === '全部' 
                ? allStations 
                : allStations.filter(s => (s.category || '未分类') === currentFilter);

            filtered.forEach(s => {
                const item = document.createElement('div');
                item.className = 'radio-item';
                item.innerHTML = `
                    ${getLogoHTML(s.logo, s.name)}
                    <span style="font-weight:600; margin-top:8px; text-align:center;">${s.name}</span>
                `;
                item.onclick = () => playStation(s, item);
                listDiv.appendChild(item);
            });
        }

        function playStation(s, element) {
            // 清除激活状态
            document.querySelectorAll('.radio-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            // 更新名称
            currentName.innerText = s.name;

            // 安全替换 Logo（修复之前 outerHTML 问题）
            const newLogo = document.createElement('div');
            newLogo.innerHTML = getLogoHTML(s.logo, s.name);
            const logoElement = newLogo.firstChild;
            logoElement.id = 'current-logo';
            document.getElementById('current-logo').replaceWith(logoElement);

            statusText.innerText = "正在连接...";

            // 播放逻辑优化
            audio.src = s.url || '';
            audio.load();
            audio.play().then(() => {
                // 成功不做额外处理，由 onplaying 事件处理
            }).catch(err => {
                console.error(err);
                statusText.innerText = "播放失败，地址可能已失效或不支持";
            });
        }

        // 播放器事件
        audio.onplaying = () => {
            statusText.innerText = "正在直播";
            masterBtn.icon = "pause";
            waveAnim.style.display = "flex";
        };
        audio.onpause = () => {
            masterBtn.icon = "play_arrow";
            waveAnim.style.display = "none";
            statusText.innerText = "已暂停";
        };
        masterBtn.onclick = () => {
            if (!audio.src) return;
            audio.paused ? audio.play() : audio.pause();
        };

        // 夜间模式
        function toggleTheme() {
            const isDark = document.body.classList.toggle('mdui-theme-dark');
            themeToggle.icon = isDark ? 'light_mode' : 'dark_mode';
            localStorage.setItem('radioThemeDark', isDark);
        }

        // 添加自定义电台
        function showAddDialog() {
            document.getElementById('add-dialog').open = true;
        }
        function closeAddDialog() {
            document.getElementById('add-dialog').open = false;
        }
        function addCustomStation() {
            const name = document.getElementById('add-name').value.trim();
            const url = document.getElementById('add-url').value.trim();
            const logo = document.getElementById('add-logo').value.trim();
            let category = document.getElementById('add-category').value.trim();

            if (!name || !url) {
                mdui.alert("电台名称和直播地址不能为空！");
                return;
            }
            if (!category) category = "自定义";

            const newStation = { name, url, logo, category };

            // 保存到 localStorage
            let customList = JSON.parse(localStorage.getItem('customRadioStations') || '[]');
            customList.push(newStation);
            localStorage.setItem('customRadioStations', JSON.stringify(customList));

            allStations.push(newStation);
            renderCategories();
            renderStations();

            closeAddDialog();
            mdui.snackbar({ message: `已添加：${name}` });
        }

        // 初始化
        function init() {
            loadCustomStations();

            if (localStorage.getItem('radioThemeDark') === 'true') {
                document.body.classList.add('mdui-theme-dark');
                themeToggle.icon = 'light_mode';
            }
            themeToggle.onclick = toggleTheme;

            renderCategories();
            renderStations();
        }

        init();
    </script>
</body>
</html>
